<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Analytics Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>AI Image Analytics Dashboard</h1>
            <p>Upload an image to automatically detect objects, scenes, and concepts using AWS Rekognition.</p>
        </header>

        <main>
            <!-- Upload Section -->
            <section class="upload-section">
                <div class="drop-zone" id="drop-zone">
                    <span class="drop-zone__prompt">Drop image here or click to upload</span>
                    <input type="file" name="file" id="file-input" class="drop-zone__input" accept="image/jpeg, image/png">
                </div>
                <div class="progress-bar-container" id="progress-container" style="display: none;">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
                <div id="upload-status" class="status-message"></div>
            </section>

            <!-- Search Section -->
            <section class="search-section">
                <input type="text" id="search-input" placeholder="Search by label (e.g., Dog, Car, Nature)...">
            </section>

            <!-- Gallery Section -->
            <section class="gallery-section">
                <div class="loader" id="gallery-loader"></div>
                <div class="gallery-grid" id="gallery-grid">
                    <!-- Cards will be dynamically inserted here by JS -->
                </div>
            </section>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
